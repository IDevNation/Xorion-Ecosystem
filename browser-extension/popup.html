<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XOS Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 350px;
      min-height: 400px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #667eea; margin-bottom: 20px; font-size: 24px; }
    h2 { color: #333; font-size: 18px; margin-bottom: 15px; }
    h3 { color: #667eea; font-size: 16px; margin-bottom: 10px; }
    .screen { display: none; }
    .screen.active { display: block; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; color: #333; font-weight: 600; font-size: 14px; }
    input[type="password"], input[type="text"], textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
    }
    input:focus, textarea:focus { outline: none; border-color: #667eea; }
    textarea { height: 100px; resize: vertical; font-family: monospace; font-size: 12px; }
    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
    button.secondary { background: #f0f0f0; color: #333; }
    button.secondary:hover { background: #e0e0e0; }
    .seed-phrase {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      border: 2px dashed #667eea;
      margin-bottom: 15px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-word;
      line-height: 1.6;
      text-align: center;
    }
    .warning {
      background: #fff3cd;
      border: 1px solid #ffc107;
      color: #856404;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 13px;
      text-align: center;
    }
    .error { color: #dc3545; font-size: 13px; margin-bottom: 10px; text-align: center; }
    .success { color: #28a745; font-size: 13px; }
    .balance {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .dashboard-info { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
    .dashboard-info p { color: #666; font-size: 13px; margin-bottom: 5px; }
    .address {
      background: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      word-break: break-all;
      border: 1px solid #ddd;
    }
    .nav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .nav-header h2 { margin-bottom: 0; }
    .lock-btn { background: #dc3545; width: auto; padding: 8px 15px; font-size: 12px; margin: 0; }
    hr { margin: 15px 0; border: none; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Welcome Screen -->
    <div id="welcome-screen" class="screen active">
      <h1>XOS Wallet</h1>
      <button onclick="showScreen('create-wallet-screen')">Create New Wallet</button>
      <button class="secondary" onclick="showScreen('import-wallet-screen')">Import Existing Wallet</button>
    </div>

    <!-- Create Wallet Screen -->
    <div id="create-wallet-screen" class="screen">
      <div class="nav-header">
        <h2>Create Wallet</h2>
        <button class="lock-btn secondary" onclick="showScreen('welcome-screen')">Back</button>
      </div>
      <div class="warning">Save your seed phrase securely. Never share it!</div>
      <div class="seed-phrase" id="seed-display">Generating...</div>
      <div class="form-group">
        <label for="create-password">Set Password</label>
        <input type="password" id="create-password" placeholder="Enter password (min 6 chars)">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm password">
      </div>
      <div id="create-error" class="error"></div>
      <button onclick="createWallet()">Create Wallet</button>
    </div>

    <!-- Import Wallet Screen -->
    <div id="import-wallet-screen" class="screen">
      <div class="nav-header">
        <h2>Import Wallet</h2>
        <button class="lock-btn secondary" onclick="showScreen('welcome-screen')">Back</button>
      </div>
      <div class="form-group">
        <label for="import-seed">Seed Phrase (12 words)</label>
        <textarea id="import-seed" placeholder="Enter your 12-word seed phrase"></textarea>
      </div>
      <div class="form-group">
        <label for="import-password">Set Password</label>
        <input type="password" id="import-password" placeholder="Enter password (min 6 chars)">
      </div>
      <div id="import-error" class="error"></div>
      <button onclick="importWallet()">Import Wallet</button>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="screen">
      <h1>XOS Wallet Locked</h1>
      <div class="form-group">
        <label for="unlock-password">Enter Password</label>
        <input type="password" id="unlock-password" placeholder="Enter your password">
      </div>
      <div id="unlock-error" class="error"></div>
      <button onclick="unlockWallet()">Unlock</button>
      <button class="secondary" onclick="showScreen('welcome-screen')">Switch Wallet</button>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen">
      <div class="nav-header">
        <h2>Dashboard</h2>
        <button class="lock-btn" onclick="lockWallet()">Lock</button>
      </div>
      <div class="balance" id="balance-display">0.00 XOS</div>
      <div class="dashboard-info">
        <p><strong>Address:</strong></p>
        <div class="address" id="address-display">Loading...</div>
      </div>
      <hr>
      <h3>Send Transaction</h3>
      <div class="form-group">
        <label for="recipient">Recipient Address</label>
        <input type="text" id="recipient" placeholder="Enter recipient address">
      </div>
      <div class="form-group">
        <label for="amount">Amount (XOS)</label>
        <input type="text" id="amount" placeholder="Enter amount">
      </div>
      <div id="tx-status"></div>
      <button onclick="sendTransaction()">Send XOS</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
